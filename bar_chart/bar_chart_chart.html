<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Horizontal Bar Chart</title>
  <script>
    (function () {
      var key = "assets-theme";
      var theme = null;

      try {
        theme = localStorage.getItem(key);
      } catch (error) {}

      if (theme !== "light" && theme !== "dark") {
        theme = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
          ? "dark"
          : "light";
      }

      document.documentElement.dataset.theme = theme;
    })();
  </script>
  <link rel="stylesheet" href="../theme.css?v=20260323a" />
  <link rel="stylesheet" href="bar_chart_chart.css?v=20260323a" />
</head>
<body>
  <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle dark mode" aria-pressed="false">
    <span class="theme-toggle-label">Theme</span>
    <span class="theme-toggle-state">Light</span>
    <span class="theme-toggle-switch" aria-hidden="true"></span>
  </button>
  <p id="bar-chart-summary" class="sr-only">Revenue distribution by quarter: Q1 40 percent, Q2 20 percent, Q3 25 percent, Q4 15 percent.</p>
  <main class="chart-wrapper" role="img" aria-labelledby="bar-chart-summary">
    <div class="chart-card">
      <div class="chart-header">
        <p class="eyebrow">Quarterly Readout</p>
        <strong>Revenue distribution</strong>
      </div>
      <div class="bar-group">
        <div class="bar-row">
          <span class="bar-label">Q1</span>
          <div class="bar-track"><div class="bar bar-q1"></div></div>
          <span class="bar-value">40%</span>
        </div>
        <div class="bar-row">
          <span class="bar-label">Q2</span>
          <div class="bar-track"><div class="bar bar-q2"></div></div>
          <span class="bar-value">20%</span>
        </div>
        <div class="bar-row">
          <span class="bar-label">Q3</span>
          <div class="bar-track"><div class="bar bar-q3"></div></div>
          <span class="bar-value">25%</span>
        </div>
        <div class="bar-row">
          <span class="bar-label">Q4</span>
          <div class="bar-track"><div class="bar bar-q4"></div></div>
          <span class="bar-value">15%</span>
        </div>
      </div>
    </div>
  </main>
  <script src="../theme.js?v=20260323a"></script>
</body>
</html>
