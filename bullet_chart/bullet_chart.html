<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bullet Chart</title>
  <script>
    (function () {
      var key = "assets-theme";
      var theme = null;

      try {
        theme = localStorage.getItem(key);
      } catch (error) {}

      if (theme !== "light" && theme !== "dark") {
        theme = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
          ? "dark"
          : "light";
      }

      document.documentElement.dataset.theme = theme;
    })();
  </script>
  <link rel="stylesheet" href="../theme.css?v=20260323a" />
  <link rel="stylesheet" href="bullet_chart.css?v=20260323a" />
</head>
<body>
  <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle dark mode" aria-pressed="false">
    <span class="theme-toggle-label">Theme</span>
    <span class="theme-toggle-state">Light</span>
    <span class="theme-toggle-switch" aria-hidden="true"></span>
  </button>
  <p id="bullet-chart-summary" class="sr-only">Pipeline coverage bullet chart showing 92 percent against a target of 100 percent on a scale up to 120 percent.</p>
  <main aria-labelledby="bullet-chart-summary">
  <article class="bullet-card">
    <div class="card-head">
      <div>
        <p class="eyebrow">Target Readout</p>
        <h1>Pipeline Coverage</h1>
      </div>
      <span class="headline">92%</span>
    </div>
    <div class="bullet-scale" aria-hidden="true">
      <span class="range range-low"></span>
      <span class="range range-mid"></span>
      <span class="range range-high"></span>
      <span class="measure"></span>
      <span class="target"></span>
    </div>
    <div class="scale-labels">
      <span>0%</span>
      <span>Target 100%</span>
      <span>120%</span>
    </div>
    <p class="footnote">Coverage remains just below target while staying ahead of last quarter.</p>
  </article>
  </main>
  <script src="../theme.js?v=20260323a"></script>
</body>
</html>
