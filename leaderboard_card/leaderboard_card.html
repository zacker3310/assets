<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leaderboard Card</title>
  <script>
    (function () {
      var key = "assets-theme";
      var theme = null;

      try {
        theme = localStorage.getItem(key);
      } catch (error) {}

      if (theme !== "light" && theme !== "dark") {
        theme = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
          ? "dark"
          : "light";
      }

      document.documentElement.dataset.theme = theme;
    })();
  </script>
  <link rel="stylesheet" href="../theme.css?v=20260323a" />
  <link rel="stylesheet" href="leaderboard_card.css?v=20260323a" />
</head>
<body>
  <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle dark mode" aria-pressed="false">
    <span class="theme-toggle-label">Theme</span>
    <span class="theme-toggle-state">Light</span>
    <span class="theme-toggle-switch" aria-hidden="true"></span>
  </button>
  <p id="leaderboard-summary" class="sr-only">Top performers leaderboard for Q1 2026. Harper leads with 128 points, followed by Sofia with 117, Theo with 104, and Liam with 99.</p>
  <main aria-labelledby="leaderboard-summary">
  <section class="leaderboard-card">
    <div class="header-row">
      <div>
        <p class="eyebrow">Ranking</p>
        <h1>Top performers</h1>
      </div>
      <span class="period">Q1 2026</span>
    </div>
    <div class="rows">
      <div class="row">
        <span class="rank">1</span>
        <span class="name">Harper</span>
        <span class="score">128 pts</span>
      </div>
      <div class="row">
        <span class="rank">2</span>
        <span class="name">Sofia</span>
        <span class="score">117 pts</span>
      </div>
      <div class="row">
        <span class="rank">3</span>
        <span class="name">Theo</span>
        <span class="score">104 pts</span>
      </div>
      <div class="row">
        <span class="rank">4</span>
        <span class="name">Liam</span>
        <span class="score">99 pts</span>
      </div>
    </div>
  </section>
  </main>
  <script src="../theme.js?v=20260323a"></script>
</body>
</html>
