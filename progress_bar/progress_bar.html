<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Progress Bar</title>
  <link rel="stylesheet" href="progress_bar.css" />
</head>
<body>
  <div class="bounding-box">
    <div class="progress-card">
      <div class="progress-copy">
        <p class="eyebrow">Project Delivery</p>
        <div class="progress-heading">
          <strong>75% complete</strong>
          <span>Target: April 2026</span>
        </div>
      </div>
      <div class="progress-bar">
        <div class="progress-left"></div>
        <div class="progress-right"></div>
        <div class="progress-gloss"></div>
      </div>
      <p class="progress-footnote">Build, QA, and launch prep are on track.</p>
    </div>
  </div>
</body>
</html>
