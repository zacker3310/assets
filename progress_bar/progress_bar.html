<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Progress Bar</title>
  <script>
    (function () {
      var key = "assets-theme";
      var theme = null;

      try {
        theme = localStorage.getItem(key);
      } catch (error) {}

      if (theme !== "light" && theme !== "dark") {
        theme = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
          ? "dark"
          : "light";
      }

      document.documentElement.dataset.theme = theme;
    })();
  </script>
  <link rel="stylesheet" href="../theme.css?v=20260323a" />
  <link rel="stylesheet" href="progress_bar.css?v=20260323a" />
</head>
<body>
  <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle dark mode" aria-pressed="false">
    <span class="theme-toggle-label">Theme</span>
    <span class="theme-toggle-state">Light</span>
    <span class="theme-toggle-switch" aria-hidden="true"></span>
  </button>
  <p id="progress-summary" class="sr-only">Delivery progress card showing 75 percent complete with target date April 2026.</p>
  <main class="bounding-box" aria-labelledby="progress-summary">
    <div class="progress-card">
      <div class="progress-copy">
        <p class="eyebrow">Delivery</p>
        <div class="progress-heading">
          <strong>75% complete</strong>
          <span>April 2026</span>
        </div>
      </div>
      <div class="progress-bar">
        <div class="progress-left"></div>
        <div class="progress-right"></div>
        <div class="progress-gloss"></div>
      </div>
    </div>
  </main>
  <script src="../theme.js?v=20260323a"></script>
</body>
</html>
