<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Progress Bar</title>
  <link rel="stylesheet" href="../theme.css?v=20260322b" />
  <link rel="stylesheet" href="progress_bar.css" />
</head>
<body>
  <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle dark mode" aria-pressed="false">
    <span class="theme-toggle-label">Theme</span>
    <span class="theme-toggle-state">Light</span>
    <span class="theme-toggle-switch" aria-hidden="true"></span>
  </button>
  <div class="bounding-box">
    <div class="progress-card">
      <div class="progress-copy">
        <p class="eyebrow">Delivery</p>
        <div class="progress-heading">
          <strong>75% complete</strong>
          <span>April 2026</span>
        </div>
      </div>
      <div class="progress-bar">
        <div class="progress-left"></div>
        <div class="progress-right"></div>
        <div class="progress-gloss"></div>
      </div>
      <p class="progress-footnote">Build and release preparation remain aligned.</p>
    </div>
  </div>
  <script src="../theme.js?v=20260322b"></script>
</body>
</html>
