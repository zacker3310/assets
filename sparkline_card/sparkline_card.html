<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sparkline Card</title>
  <link rel="stylesheet" href="sparkline_card.css" />
</head>
<body>
  <article class="spark-card">
    <div class="copy-row">
      <div>
        <p class="eyebrow">Weekly Activity</p>
        <h1>18.6k</h1>
      </div>
      <span class="trend">+8%</span>
    </div>
    <div class="sparkline" aria-hidden="true">
      <span style="--value: 34%"></span>
      <span style="--value: 46%"></span>
      <span style="--value: 40%"></span>
      <span style="--value: 58%"></span>
      <span style="--value: 63%"></span>
      <span style="--value: 72%"></span>
      <span style="--value: 88%"></span>
    </div>
    <p class="caption">Engagement climbed steadily after the campaign refresh.</p>
  </article>
</body>
</html>
