<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sparkline Card</title>
  <script>
    (function () {
      var key = "assets-theme";
      var theme = null;

      try {
        theme = localStorage.getItem(key);
      } catch (error) {}

      if (theme !== "light" && theme !== "dark") {
        theme = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
          ? "dark"
          : "light";
      }

      document.documentElement.dataset.theme = theme;
    })();
  </script>
  <link rel="stylesheet" href="../theme.css?v=20260323a" />
  <link rel="stylesheet" href="sparkline_card.css?v=20260323a" />
</head>
<body>
  <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle dark mode" aria-pressed="false">
    <span class="theme-toggle-label">Theme</span>
    <span class="theme-toggle-state">Light</span>
    <span class="theme-toggle-switch" aria-hidden="true"></span>
  </button>
  <p id="sparkline-summary" class="sr-only">Activity sparkline card showing 18.6 thousand and an increase of 8 percent with a steady upward trend across seven bars.</p>
  <main aria-labelledby="sparkline-summary">
  <article class="spark-card">
    <div class="copy-row">
      <div>
        <p class="eyebrow">Activity</p>
        <h1>18.6k</h1>
      </div>
      <span class="trend">+8%</span>
    </div>
    <div class="sparkline" aria-hidden="true">
      <span style="--value: 34%"></span>
      <span style="--value: 46%"></span>
      <span style="--value: 40%"></span>
      <span style="--value: 58%"></span>
      <span style="--value: 63%"></span>
      <span style="--value: 72%"></span>
      <span style="--value: 88%"></span>
    </div>
    <p class="caption">Engagement rose steadily after the refresh.</p>
  </article>
  </main>
  <script src="../theme.js?v=20260323a"></script>
</body>
</html>
