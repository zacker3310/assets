<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stat Card</title>
  <script>
    (function () {
      var key = "assets-theme";
      var theme = null;

      try {
        theme = localStorage.getItem(key);
      } catch (error) {}

      if (theme !== "light" && theme !== "dark") {
        theme = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
          ? "dark"
          : "light";
      }

      document.documentElement.dataset.theme = theme;
    })();
  </script>
  <link rel="stylesheet" href="../theme.css?v=20260323a" />
  <link rel="stylesheet" href="stat_card.css?v=20260323a" />
</head>
<body>
  <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle dark mode" aria-pressed="false">
    <span class="theme-toggle-label">Theme</span>
    <span class="theme-toggle-state">Light</span>
    <span class="theme-toggle-switch" aria-hidden="true"></span>
  </button>
  <p id="stat-card-summary" class="sr-only">Revenue stat card showing 2.84 million dollars, up 12.4 percent, with 83 new accounts and 94 percent retention.</p>
  <main aria-labelledby="stat-card-summary">
  <article class="stat-card">
    <p class="eyebrow">Revenue</p>
    <div class="stat-row">
      <h1>$2.84M</h1>
      <span class="delta">+12.4%</span>
    </div>
    <p class="context">Quarter-over-quarter growth driven by enterprise renewals.</p>
    <div class="footer-row">
      <span>83 new accounts</span>
      <span>94% retention</span>
    </div>
  </article>
  </main>
  <script src="../theme.js?v=20260323a"></script>
</body>
</html>
