<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stat Card</title>
  <link rel="stylesheet" href="stat_card.css" />
</head>
<body>
  <article class="stat-card">
    <p class="eyebrow">Net Revenue</p>
    <div class="stat-row">
      <h1>$2.84M</h1>
      <span class="delta">+12.4%</span>
    </div>
    <p class="context">Up quarter over quarter with stronger enterprise renewals.</p>
    <div class="footer-row">
      <span>83 new accounts</span>
      <span>94% retention</span>
    </div>
  </article>
</body>
</html>
