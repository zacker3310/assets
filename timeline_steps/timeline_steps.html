<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timeline Steps</title>
  <script>
    (function () {
      var key = "assets-theme";
      var theme = null;

      try {
        theme = localStorage.getItem(key);
      } catch (error) {}

      if (theme !== "light" && theme !== "dark") {
        theme = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
          ? "dark"
          : "light";
      }

      document.documentElement.dataset.theme = theme;
    })();
  </script>
  <link rel="stylesheet" href="../theme.css?v=20260323a" />
  <link rel="stylesheet" href="timeline_steps.css?v=20260323a" />
</head>
<body>
  <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle dark mode" aria-pressed="false">
    <span class="theme-toggle-label">Theme</span>
    <span class="theme-toggle-state">Light</span>
    <span class="theme-toggle-switch" aria-hidden="true"></span>
  </button>
  <p id="timeline-summary" class="sr-only">Release plan timeline with Design complete, Build in progress, QA next, and Ship scheduled for April.</p>
  <main aria-labelledby="timeline-summary">
  <section class="timeline-card">
    <div class="header-row">
      <div>
        <p class="eyebrow">Timeline</p>
        <h1>Release plan</h1>
      </div>
      <span class="status-pill">On Track</span>
    </div>
    <div class="timeline">
      <article class="step is-complete">
        <span class="dot"></span>
        <strong>Design</strong>
        <span class="meta">Complete</span>
      </article>
      <article class="step is-current">
        <span class="dot"></span>
        <strong>Build</strong>
        <span class="meta">In progress</span>
      </article>
      <article class="step">
        <span class="dot"></span>
        <strong>QA</strong>
        <span class="meta">Next</span>
      </article>
      <article class="step">
        <span class="dot"></span>
        <strong>Ship</strong>
        <span class="meta">April</span>
      </article>
    </div>
  </section>
  </main>
  <script src="../theme.js?v=20260323a"></script>
</body>
</html>
