<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timeline Steps</title>
  <link rel="stylesheet" href="../theme.css?v=20260322b" />
  <link rel="stylesheet" href="timeline_steps.css" />
</head>
<body>
  <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle dark mode" aria-pressed="false">
    <span class="theme-toggle-label">Theme</span>
    <span class="theme-toggle-state">Light</span>
    <span class="theme-toggle-switch" aria-hidden="true"></span>
  </button>
  <section class="timeline-card">
    <div class="header-row">
      <div>
        <p class="eyebrow">Timeline</p>
        <h1>Release plan</h1>
      </div>
      <span class="status-pill">On Track</span>
    </div>
    <div class="timeline">
      <article class="step is-complete">
        <span class="dot"></span>
        <strong>Design</strong>
        <span class="meta">Complete</span>
      </article>
      <article class="step is-current">
        <span class="dot"></span>
        <strong>Build</strong>
        <span class="meta">In progress</span>
      </article>
      <article class="step">
        <span class="dot"></span>
        <strong>QA</strong>
        <span class="meta">Next</span>
      </article>
      <article class="step">
        <span class="dot"></span>
        <strong>Ship</strong>
        <span class="meta">April</span>
      </article>
    </div>
  </section>
  <script src="../theme.js?v=20260322b"></script>
</body>
</html>
